name: Update Property Feed

on:
  schedule:
    - cron: '0 6 * * *' # Every day at 6am UTC
  workflow_dispatch: # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Parse XML feed
        run: node parse-feed.js
        timeout-minutes: 5

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet public/data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "count=$(node -e 'console.log(require("./public/data.json").length)')" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "Avena Feed Bot"
          git config user.email "bot@avena-explorer.app"
          git add public/data.json
          git commit -m "Auto-update: $(date +%Y-%m-%d) — ${{ steps.check.outputs.count }} properties"
          git push
